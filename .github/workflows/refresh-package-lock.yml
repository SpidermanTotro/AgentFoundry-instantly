name: Refresh package lock

on:
  push:
    branches: [agent/regenerate-package-lock]
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/refresh-package-lock.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/regenerate-package-lock

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Regenerate package lock"
          git push
